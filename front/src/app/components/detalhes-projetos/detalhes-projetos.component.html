<div class="container-main">

    <div class="main-titles">
        <div class="container-title">
            <h1>{{ projeto.titulo }}</h1>
            <p class="description">Rua das flores, 123, Cidade - SP</p>
        </div>


        <div class="gallery-container">
            <div class="gallery-img-large flex-1">
                <img alt="Vista principal da casa reformada" class="gallery-img" [src]="projeto.assets[0]"
                    (click)="OpenSlider()" />
            </div>

            <div class="gallery-img-small flex-1">

                <img *ngFor="let imagem of projeto.assets | slice:1:4" class="gallery-img img-small" [src]="imagem"
                    (click)="OpenSlider()" />

                <div *ngIf="projeto.assets.length >= 5" class="gallery-img img-small last-img gallery-item-wrapper"
                    (click)="OpenSlider()">
                    <img alt="Detalhe da decoração" class="gallery-img " [src]="projeto.assets[3]" />

                    <div class="image-overlay">
                        <span>+{{ projeto.assets.length - 4 }}</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="details-section scroll-hidden" #containerMainRef>

            <div class="project-info">

                <h2 class="section-title">Sobre a Reforma</h2>
                <p class="project-description"> {{ projeto.descricao_detalhada || "-" }} </p>

            </div>

        </div>
    </div>
</div>

<app-slider [assets]="projeto.assets" [isOpen]="isOpen" (closeSlider)="closeSlider()"></app-slider>
